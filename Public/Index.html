<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratheek Enterprises - Subagent Portal</title>
    
    <!-- Premium Font for Business Identity -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Link to your separated external CSS file -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Configure Tailwind to use the premium font -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-800 font-sans min-h-screen animated-bg overflow-x-hidden">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="flex flex-col gap-3 fixed bottom-6 right-6 z-50"></div>

    <!-- Loading Spinner -->
    <div id="loading-overlay" class="glass-overlay flex flex-col items-center justify-center" style="display: none;">
        <i data-lucide="loader" class="animate-spin w-12 h-12 text-blue-600 mb-3 drop-shadow-lg"></i>
        <p class="text-blue-900 font-bold tracking-wide">Processing Securely...</p>
    </div>

    <!-- Main Application Container -->
    <div id="app" class="overflow-x-hidden w-full"></div>

    <!-- Link to your separated external JS file -->
    <script src="script.js"></script>
</body>
</html>
