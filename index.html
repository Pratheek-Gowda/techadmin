<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratheek Enterprises Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="bg-blue-600 text-white py-2">
        <marquee id="marqueeText">Loading updates...</marquee>
    </div>

    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-2xl font-bold mb-6">Pratheek Enterprises Dashboard</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded shadow">
                <h2 class="text-gray-500 uppercase text-sm">Your Balance</h2>
                <p id="userBalance" class="text-4xl font-bold text-green-600">₹ 0.00</p>
                
                <h3 class="mt-6 font-bold border-b pb-2">History</h3>
                <ul id="historyList" class="mt-2 text-sm divide-y">
                    </ul>
            </div>

            <div class="bg-gray-800 text-white p-6 rounded shadow">
                <h2 class="font-bold mb-4">Admin Quick Tools</h2>
                
                <label class="block text-xs mb-1">Update Marquee</label>
                <input id="newMarquee" type="text" class="w-full p-2 text-black rounded mb-3" placeholder="Enter news...">
                <button onclick="updateMarquee()" class="bg-blue-500 w-full py-2 rounded">Update Notice</button>

                <hr class="my-4 opacity-20">

                <label class="block text-xs mb-1">Credit User (User ID)</label>
                <div class="flex gap-2">
                    <input id="targetId" type="text" class="w-1/4 p-2 text-black rounded" placeholder="ID">
                    <input id="amount" type="number" class="w-3/4 p-2 text-black rounded" placeholder="Amount">
                </div>
                <button onclick="sendFunds()" class="bg-green-500 w-full mt-3 py-2 rounded">Transfer Funds</button>
            </div>
        </div>
    </div>

    <script>
        // REPLACE THIS with your actual Vercel URL after deploying
        const API_URL = '/api'; 

        // Load Data on Startup
        async function loadDashboard() {
            const res = await fetch(`${API_URL}?id=1`); // Example: Loading User ID 1
            const data = await res.json();
            
            document.getElementById('userBalance').innerText = `₹ ${data.user.wallet_balance}`;
            document.getElementById('marqueeText').innerText = data.marquee;
        }

        async function updateMarquee() {
            const text = document.getElementById('newMarquee').value;
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'UPDATE_MARQUEE', content: text })
            });
            alert("Marquee Updated!");
            loadDashboard();
        }

        async function sendFunds() {
            const id = document.getElementById('targetId').value;
            const amt = document.getElementById('amount').value;
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'MANAGE_FUNDS', userId: id, amount: amt })
            });
            alert("Funds Transferred!");
            loadDashboard();
        }

        loadDashboard();
    </script>
</body>
</html>
