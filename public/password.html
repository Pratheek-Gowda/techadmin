<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Reset | Pratheek Enterprises</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        .animated-bg {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card-dark {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
        }
        input {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05) !important;
            color: white !important;
        }
        input:focus {
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5) !important;
            background: rgba(255, 255, 255, 0.1) !important;
        }
        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 50; }
        .toast {
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen animated-bg flex items-center justify-center p-4">

    <div id="toast-container" class="flex flex-col gap-3"></div>

    <div class="glass-card-dark p-10 rounded-3xl w-full max-w-md relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-600 rounded-full mix-blend-screen filter blur-3xl opacity-30"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-red-600 rounded-full mix-blend-screen filter blur-3xl opacity-20"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="bg-white/10 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/20">
                <i data-lucide="key-round" class="text-blue-400 w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-white">Master Override</h1>
            <p class="text-gray-400 font-medium mt-2 text-sm">Authorized Personnel Only</p>
        </div>

        <form id="reset-form" class="space-y-5 relative z-10">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Master Key</label>
                <input type="password" id="master-key" class="block w-full px-4 py-3 border border-white/10 rounded-xl outline-none" required placeholder="Enter the main key">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Target Username</label>
                <input type="text" id="target-user" class="block w-full px-4 py-3 border border-white/10 rounded-xl outline-none" required placeholder="User or Admin name">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">New Password</label>
                <input type="password" id="new-password" class="block w-full px-4 py-3 border border-white/10 rounded-xl outline-none" required placeholder="Enter new password">
            </div>
            <button type="submit" id="submit-btn" class="w-full py-4 px-4 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-900/50 transition-all mt-6 flex items-center justify-center gap-2">
                <i data-lucide="shield-check" class="w-5 h-5"></i> Execute Override
            </button>
            <div class="text-center mt-4">
                <a href="/" class="text-sm text-blue-400 hover:text-blue-300 font-semibold transition-colors">Return to Dashboard</a>
            </div>
        </form>
    </div>

    <script>
        lucide.createIcons();

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-600/90' : type === 'success' ? 'bg-green-600/90' : 'bg-blue-600/90';
            
            toast.className = `toast ${bg} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 font-semibold transform translate-x-full opacity-0`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-5 h-5"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
                toast.classList.add('translate-x-0', 'opacity-100');
            }, 10);

            setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Processing...';
            lucide.createIcons();
            btn.disabled = true;

            const masterKey = document.getElementById('master-key').value;
            const targetUsername = document.getElementById('target-user').value;
            const newPassword = document.getElementById('new-password').value;

            try {
                const res = await fetch('/api/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ masterKey, targetUsername, newPassword })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showToast(`Password successfully updated for ${targetUsername}`, 'success');
                    document.getElementById('reset-form').reset();
                } else {
                    showToast(data.error || 'Failed to update password', 'error');
                }
            } catch (err) {
                showToast('Network error occurred', 'error');
            } finally {
                btn.innerHTML = originalText;
                lucide.createIcons();
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
