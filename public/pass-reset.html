<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset | Pratheek Enterprises</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="text-gray-800 font-sans min-h-screen animated-bg flex items-center justify-center p-4">
    <div id="toast-container" class="flex flex-col gap-3 fixed bottom-6 right-6 z-50"></div>

    <div class="glass-card p-8 sm:p-10 rounded-3xl w-full max-w-md animate-fade-in border-t-4 border-t-blue-600">
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner">
                <i data-lucide="key-round" class="text-blue-600 w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">Reset Password</h1>
            <p class="text-gray-500 font-medium mt-2 text-sm">Update your account password securely</p>
        </div>

        <form id="pass-reset-form" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Old Password</label>
                <input type="password" id="old-password" autocomplete="current-password" class="block w-full bg-white/90 px-4 py-3 border border-gray-200 rounded-xl focus:outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">New Password</label>
                <input type="password" id="new-password" autocomplete="new-password" class="block w-full bg-white/90 px-4 py-3 border border-gray-200 rounded-xl focus:outline-none" required minlength="8">
                <p class="text-xs text-gray-500 mt-1">Minimum 8 characters</p>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Confirm New Password</label>
                <input type="password" id="confirm-new-password" autocomplete="new-password" class="block w-full bg-white/90 px-4 py-3 border border-gray-200 rounded-xl focus:outline-none" required minlength="8">
            </div>
            <button type="submit" id="submit-btn" class="w-full py-3 px-4 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all mt-4">
                Update Password
            </button>
            <div class="text-center mt-2">
                <a href="/" class="text-sm text-blue-600 hover:text-blue-700 font-semibold">Back to Dashboard</a>
            </div>
        </form>
    </div>

    <script>
        if (window.lucide) lucide.createIcons();

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-600/90' : type === 'success' ? 'bg-green-600/90' : 'bg-blue-600/90';
            toast.className = `toast ${bg} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 font-semibold transform translate-x-full opacity-0`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-5 h-5"></i> <span>${message}</span>`;
            container.appendChild(toast);
            if (window.lucide) lucide.createIcons();
            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
                toast.classList.add('translate-x-0', 'opacity-100');
            }, 10);
            setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        document.getElementById('pass-reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');

            if (!currentUser || !currentUser.id) {
                showToast('Please login first to reset password.', 'error');
                return;
            }

            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmNewPassword = document.getElementById('confirm-new-password').value;

            if (newPassword.length < 8) {
                showToast('New password must be at least 8 characters.', 'error');
                return;
            }

            if (newPassword !== confirmNewPassword) {
                showToast('New passwords do not match.', 'error');
                return;
            }

            const btn = document.getElementById('submit-btn');
            const originalLabel = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const res = await fetch('/api/pass-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        username: currentUser.username,
                        oldPassword,
                        newPassword,
                        confirmNewPassword
                    })
                });

                const data = await res.json();
                if (!res.ok) {
                    showToast(data.error || 'Failed to update password.', 'error');
                    return;
                }

                showToast(data.message || 'Password updated successfully.', 'success');
                document.getElementById('pass-reset-form').reset();
            } catch (err) {
                showToast('Network error occurred.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = originalLabel;
            }
        });
    </script>
</body>
</html>
