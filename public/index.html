<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratheek Enterprises - Subagent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom Marquee Animation */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        /* Toast Notification System */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 50;
        }
        .toast {
            transition: opacity 0.3s ease-in-out;
        }
        /* Loading Overlay */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="flex flex-col gap-2"></div>

    <!-- Loading Spinner -->
    <div id="loading-overlay" class="flex flex-col items-center">
        <i data-lucide="loader" class="animate-spin w-10 h-10 text-blue-600 mb-2"></i>
        <p class="text-blue-800 font-semibold">Processing...</p>
    </div>

    <!-- Main Application Container -->
    <div id="app"></div>

    <script>
        /* ==========================================
           STATE MANAGEMENT & API WRAPPERS
           ========================================== */
        
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let adminData = { adminWallet: 0, marqueeText: 'Loading...', transactions: [] };
        let usersData = [];
        let fundRequests = [];

        // Helper to show loading state
        function setLoading(isLoading) {
            document.getElementById('loading-overlay').style.display = isLoading ? 'flex' : 'none';
        }

        // Custom Toast Notification
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500';
            
            toast.className = `toast ${bg} text-white px-4 py-2 rounded shadow-lg flex items-center gap-2`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Generic API Fetcher
        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = { 
                method, 
                headers: { 'Content-Type': 'application/json' } 
            };
            if (body) options.body = JSON.stringify(body);
            
            setLoading(true);
            try {
                const res = await fetch(endpoint, options);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server error occurred');
                return data;
            } catch (err) {
                showToast(err.message, 'error');
                throw err;
            } finally {
                setLoading(false);
            }
        }

        // Fetch fresh data from backend
        async function loadData() {
            if (!currentUser) return;
            try {
                const [adminRes, usersRes] = await Promise.all([
                    apiCall('/api/admin'),
                    apiCall('/api/users')
                ]);
                
                adminData = adminRes;
                usersData = usersRes.users;

                // Fetch live pending requests if Admin
                if (currentUser.role === 'admin') {
                    const reqRes = await apiCall('/api/requests');
                    fundRequests = reqRes.requests;
                }
                
                // Refresh currentUser balance if they are a regular user
                if (currentUser.role === 'user') {
                    const freshUser = usersData.find(u => u.id === currentUser.id);
                    if (freshUser) {
                        currentUser.balance = freshUser.balance;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    } else {
                        // User was deleted by admin
                        logout();
                        return;
                    }
                }
                
                render();
            } catch (error) {
                console.error("Failed to load data:", error);
            }
        }

        /* ==========================================
           RENDERING LOGIC
           ========================================== */
        
        const app = document.getElementById('app');

        function render() {
            if (!currentUser) {
                renderLogin();
            } else if (currentUser.role === 'admin') {
                renderAdminDashboard();
            } else {
                renderUserDashboard();
            }
            lucide.createIcons();
        }

        /* --- LOGIN VIEW --- */
        function renderLogin() {
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border-t-4 border-blue-600">
                        <div class="text-center mb-8">
                            <h1 class="text-2xl font-bold text-blue-900">Pratheek Enterprises</h1>
                            <p class="text-gray-500 text-sm mt-2">Subagent Portal Login</p>
                        </div>
                        <form id="login-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Username</label>
                                <input type="text" id="username" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Password</label>
                                <input type="password" id="password" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" required>
                            </div>
                            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                Sign In
                            </button>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                try {
                    const data = await apiCall('/api/login', 'POST', { username, password });
                    if (data.success) {
                        currentUser = data.user;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        showToast(`Welcome ${currentUser.username}`, 'success');
                        await loadData();
                    }
                } catch (e) {
                    // Handled by apiCall
                }
            });
        }

        /* --- ADMIN DASHBOARD --- */
        function renderAdminDashboard() {
            let usersHtml = usersData.map(u => `
                <tr class="border-t hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium">${u.username}</td>
                    <td class="px-4 py-3 font-bold text-green-600">₹${u.balance}</td>
                    <td class="px-4 py-3 flex gap-2">
                        <button onclick="handleCreditDebit(${u.id}, '${u.username}', 'Credit')" class="bg-green-100 text-green-700 px-3 py-1 rounded text-sm hover:bg-green-200 shadow-sm font-semibold">Credit</button>
                        <button onclick="handleCreditDebit(${u.id}, '${u.username}', 'Debit')" class="bg-red-100 text-red-700 px-3 py-1 rounded text-sm hover:bg-red-200 shadow-sm font-semibold">Debit</button>
                        <button onclick="handleDeleteUser(${u.id}, '${u.username}')" class="bg-gray-200 text-gray-700 px-2 py-1 rounded text-sm hover:bg-gray-300 shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');

            if(usersHtml === '') usersHtml = '<tr><td colspan="3" class="p-4 text-center text-gray-500">No users found. Add one above!</td></tr>';

            let transactionsHtml = adminData.transactions.map(t => {
                const date = new Date(t.created_at).toLocaleString();
                return `
                <tr class="border-t hover:bg-gray-50">
                    <td class="px-4 py-2 text-xs text-gray-500">${date}</td>
                    <td class="px-4 py-2 font-medium">${t.user || 'System'}</td>
                    <td class="px-4 py-2"><span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-md ${t.type === 'Credit' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${t.type}</span></td>
                    <td class="px-4 py-2 font-bold ${t.type === 'Credit' ? 'text-green-600' : 'text-red-600'}">₹${t.amount}</td>
                    <td class="px-4 py-2 text-sm text-gray-600">${t.description}</td>
                </tr>
            `}).join('');

            if(transactionsHtml === '') transactionsHtml = '<tr><td colspan="5" class="p-4 text-center text-gray-500">No transactions recorded yet.</td></tr>';

            // Displays the live fund requests with Approve/Reject buttons
            let requestsHtml = fundRequests.map(r => `
                <div class="bg-yellow-50 p-3 rounded border border-yellow-200 mb-2 shadow-sm">
                    <div class="text-sm mb-2">
                        <span class="font-bold text-gray-800">${r.username}</span> requested <span class="font-bold text-green-600">₹${r.amount}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="handleRequest(${r.id}, ${r.user_id}, ${r.amount}, 'approve')" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-green-700 flex-1 transition">Approve</button>
                        <button onclick="handleRequest(${r.id}, ${r.user_id}, ${r.amount}, 'reject')" class="bg-red-100 text-red-700 px-3 py-1 rounded text-xs font-bold hover:bg-red-200 transition">Reject</button>
                    </div>
                </div>
            `).join('') || '<p class="text-gray-500 text-sm text-center py-4 bg-gray-50 rounded border border-dashed">No pending requests.</p>';

            app.innerHTML = `
                <!-- Navbar -->
                <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-40">
                    <h1 class="text-xl font-bold flex items-center gap-2"><i data-lucide="shield-check"></i> Admin Portal</h1>
                    <button onclick="logout()" class="flex items-center gap-1 hover:text-blue-200 bg-blue-800 px-3 py-1 rounded transition"><i data-lucide="log-out" class="w-4 h-4"></i> Logout</button>
                </nav>

                <div class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
                    
                    <!-- Left Column -->
                    <div class="lg:col-span-2 space-y-6">
                        
                        <!-- Admin Wallet Card -->
                        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                            <h2 class="text-lg font-bold mb-2 flex items-center gap-2 text-gray-700"><i data-lucide="wallet" class="text-blue-500"></i> Master Admin Wallet</h2>
                            <div class="text-4xl font-black text-blue-900 mb-4 tracking-tight">₹${Number(adminData.adminWallet).toLocaleString('en-IN')}</div>
                            <div class="flex gap-2 bg-gray-50 p-3 rounded-lg border">
                                <input type="number" id="admin-wallet-amount" placeholder="Amount (₹)" class="border border-gray-300 p-2 rounded flex-1 focus:ring-2 focus:ring-blue-500 outline-none">
                                <button onclick="updateAdminWallet('add')" class="bg-green-600 text-white px-4 py-2 rounded font-semibold hover:bg-green-700 shadow-sm transition">Add</button>
                                <button onclick="updateAdminWallet('remove')" class="bg-red-600 text-white px-4 py-2 rounded font-semibold hover:bg-red-700 shadow-sm transition">Withdraw</button>
                            </div>
                        </div>

                        <!-- User Management -->
                        <div class="bg-white p-6 rounded-xl shadow-md">
                            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-700"><i data-lucide="users" class="text-blue-500"></i> Manage Subagents</h2>
                            
                            <form id="add-user-form" class="flex gap-2 mb-6 bg-gray-50 p-3 rounded-lg border">
                                <input type="text" id="new-username" placeholder="New Username" class="border border-gray-300 p-2 rounded flex-1 outline-none focus:ring-2 focus:ring-blue-500" required>
                                <input type="text" id="new-password" placeholder="Password" class="border border-gray-300 p-2 rounded flex-1 outline-none focus:ring-2 focus:ring-blue-500" required>
                                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded font-semibold hover:bg-blue-700 shadow-sm transition">Add User</button>
                            </form>

                            <div class="overflow-x-auto border rounded-lg">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-gray-100 text-gray-600 text-sm">
                                            <th class="px-4 py-3 font-semibold">Username</th>
                                            <th class="px-4 py-3 font-semibold">Wallet Balance</th>
                                            <th class="px-4 py-3 font-semibold">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>${usersHtml}</tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Transaction History -->
                        <div class="bg-white p-6 rounded-xl shadow-md">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-700"><i data-lucide="history" class="text-blue-500"></i> Global Transaction History</h2>
                                <button onclick="loadData()" class="text-blue-600 hover:text-blue-800 flex items-center gap-1 text-sm bg-blue-50 px-2 py-1 rounded"><i data-lucide="refresh-cw" class="w-3 h-3"></i> Refresh Data</button>
                            </div>
                            <div class="overflow-x-auto h-80 overflow-y-auto border rounded-lg relative">
                                <table class="w-full text-left border-collapse text-sm">
                                    <thead class="sticky top-0 bg-gray-100 shadow-sm z-10">
                                        <tr class="text-gray-600">
                                            <th class="px-4 py-3 font-semibold">Date</th>
                                            <th class="px-4 py-3 font-semibold">User</th>
                                            <th class="px-4 py-3 font-semibold">Type</th>
                                            <th class="px-4 py-3 font-semibold">Amount</th>
                                            <th class="px-4 py-3 font-semibold">Description</th>
                                        </tr>
                                    </thead>
                                    <tbody>${transactionsHtml}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="space-y-6">
                        
                        <!-- Fund Requests -->
                        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-yellow-400">
                            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-700"><i data-lucide="bell" class="text-yellow-500"></i> Live Fund Requests</h2>
                            <div class="max-h-80 overflow-y-auto pr-1">
                                ${requestsHtml}
                            </div>
                        </div>

                        <!-- Notification Settings -->
                        <div class="bg-white p-6 rounded-xl shadow-md">
                            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-700"><i data-lucide="megaphone" class="text-blue-500"></i> Daily Marquee Alert</h2>
                            <textarea id="marquee-input" class="w-full border border-gray-300 p-3 rounded-lg h-24 mb-3 outline-none focus:ring-2 focus:ring-blue-500 text-sm">${adminData.marqueeText}</textarea>
                            <button onclick="updateMarquee()" class="w-full bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700 shadow-sm transition">Publish Announcement</button>
                        </div>

                    </div>
                </div>
            `;

            // Event Listeners for Admin UI
            document.getElementById('add-user-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('new-username').value;
                const password = document.getElementById('new-password').value;
                
                try {
                    await apiCall('/api/users', 'POST', { username, password });
                    showToast('User created successfully', 'success');
                    await loadData();
                } catch (err) {}
            });
        }

        /* --- USER DASHBOARD --- */
        function renderUserDashboard() {
            // Filter transactions strictly for this user
            const userTx = adminData.transactions.filter(t => t.user === currentUser.username);
            
            let userTransactionsHtml = userTx.map(t => {
                const date = new Date(t.created_at).toLocaleString();
                const isIncoming = t.type === 'Credit';
                
                return `
                <tr class="border-t hover:bg-gray-50">
                    <td class="px-4 py-3 text-xs text-gray-500">${date}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-md ${isIncoming ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${isIncoming ? 'Received' : 'Deducted'}
                        </span>
                    </td>
                    <td class="px-4 py-3 font-bold ${isIncoming ? 'text-green-600' : 'text-red-600'}">
                        ${isIncoming ? '+' : '-'}₹${t.amount}
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600">${t.description}</td>
                </tr>
            `}).join('');

            if(userTransactionsHtml === '') userTransactionsHtml = '<tr><td colspan="4" class="p-6 text-center text-gray-500 bg-gray-50">No recent activity.</td></tr>';

            app.innerHTML = `
                <!-- Marquee Notification -->
                <div class="bg-yellow-400 text-yellow-900 py-2 marquee-container font-semibold shadow-sm border-b border-yellow-500">
                    <div class="marquee-content w-full">${adminData.marqueeText}</div>
                </div>

                <!-- Navbar -->
                <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-40">
                    <h1 class="text-xl font-bold flex items-center gap-2"><i data-lucide="user-circle"></i> ${currentUser.username}'s Portal</h1>
                    <button onclick="logout()" class="flex items-center gap-1 hover:text-blue-200 bg-blue-800 px-3 py-1 rounded transition"><i data-lucide="log-out" class="w-4 h-4"></i> Logout</button>
                </nav>

                <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
                    
                    <!-- Wallet Info Column -->
                    <div class="md:col-span-1 space-y-6">
                        <!-- Balance Card -->
                        <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-green-500 text-center relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="wallet" class="w-16 h-16"></i></div>
                            <h2 class="text-gray-500 font-bold mb-2 uppercase text-sm tracking-wider">Current Balance</h2>
                            <div class="text-5xl font-black text-green-600 mb-6 drop-shadow-sm">₹${Number(currentUser.balance).toLocaleString('en-IN')}</div>
                            
                            <hr class="mb-4 border-gray-100">
                            
                            <!-- Fund Request Box -->
                            <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                                <h3 class="font-bold text-gray-700 mb-3 text-sm text-left flex items-center gap-1"><i data-lucide="hand-coins" class="w-4 h-4"></i> Request Funds</h3>
                                <div class="flex flex-col gap-2">
                                    <input type="number" id="request-amount" placeholder="Amount (₹)" class="border border-gray-300 p-2 rounded w-full outline-none focus:ring-2 focus:ring-blue-500">
                                    <button onclick="requestFunds()" class="bg-blue-600 text-white px-4 py-2 rounded font-semibold hover:bg-blue-700 w-full flex justify-center items-center gap-2 transition shadow-sm">
                                        <i data-lucide="send" class="w-4 h-4"></i> Send Request
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Admin Contact -->
                        <div class="bg-gray-900 text-white p-6 rounded-xl shadow-lg relative overflow-hidden">
                            <div class="absolute -bottom-4 -right-4 opacity-10"><i data-lucide="phone" class="w-32 h-32"></i></div>
                            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 border-b border-gray-700 pb-2 relative z-10"><i data-lucide="headset"></i> Support & Contact</h2>
                            <p class="text-sm mb-4 text-gray-400 relative z-10 leading-relaxed">For urgent queries, technical issues, or manual top-ups, please reach out to the administrator.</p>
                            <ul class="space-y-3 text-sm mt-4 relative z-10">
                                <li class="flex items-center gap-3 bg-gray-800 p-2 rounded"><i data-lucide="mail" class="w-5 h-5 text-blue-400"></i> pratheek@myyahoo.com</li>
                                <li class="flex items-center gap-3 bg-gray-800 p-2 rounded"><i data-lucide="phone-call" class="w-5 h-5 text-green-400"></i> +91 9164132150</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Transaction History Column -->
                    <div class="md:col-span-2">
                        <div class="bg-white p-6 rounded-xl shadow-lg h-full border border-gray-100">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-xl font-bold flex items-center gap-2 text-gray-800"><i data-lucide="list-ordered" class="text-blue-600"></i> Wallet Passbook</h2>
                                <button onclick="loadData()" class="text-blue-600 hover:text-blue-800 flex items-center gap-1 text-sm bg-blue-50 px-2 py-1 rounded"><i data-lucide="refresh-cw" class="w-3 h-3"></i> Refresh</button>
                            </div>
                            <div class="overflow-x-auto border rounded-lg h-[500px] overflow-y-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead class="bg-gray-100 sticky top-0 shadow-sm z-10">
                                        <tr>
                                            <th class="px-4 py-3 text-gray-600 font-semibold text-sm">Date & Time</th>
                                            <th class="px-4 py-3 text-gray-600 font-semibold text-sm">Status</th>
                                            <th class="px-4 py-3 text-gray-600 font-semibold text-sm">Amount</th>
                                            <th class="px-4 py-3 text-gray-600 font-semibold text-sm">Description</th>
                                        </tr>
                                    </thead>
                                    <tbody>${userTransactionsHtml}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            `;
        }

        /* ==========================================
           ACTION HANDLERS (Calling real APIs)
           ========================================== */

        window.logout = function() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            showToast('Logged out successfully');
            render();
        }

        /* --- Admin Actions --- */
        window.updateAdminWallet = async function(action) {
            const amt = document.getElementById('admin-wallet-amount').value;
            if (!amt || amt <= 0) return showToast('Enter a valid amount', 'error');
            
            try {
                await apiCall('/api/admin', 'PUT', { amount: amt, action });
                showToast(`Admin Wallet updated successfully`, 'success');
                document.getElementById('admin-wallet-amount').value = '';
                await loadData();
            } catch (err) {}
        }

        window.handleCreditDebit = async function(userId, username, type) {
            const rawAmt = prompt(`Enter amount to ${type} for ${username}:`);
            if (rawAmt === null) return; 
            const amt = parseInt(rawAmt);
            if (!amt || amt <= 0) return showToast('Invalid amount', 'error');

            try {
                await apiCall('/api/wallet', 'POST', { 
                    userId, 
                    amount: amt, 
                    action: type,
                    description: `Admin manual ${type.toLowerCase()}` 
                });
                showToast(`Successfully ${type === 'Credit' ? 'credited to' : 'debited from'} ${username}`, 'success');
                await loadData();
            } catch(err) {}
        }

        window.handleDeleteUser = async function(userId, username) {
            if (!confirm(`Are you sure you want to permanently delete ${username}? Their remaining balance will be returned to the Admin Wallet.`)) return;
            
            try {
                const res = await apiCall(`/api/users?id=${userId}`, 'DELETE');
                showToast(`User deleted. ₹${res.refunded || 0} returned.`, 'info');
                await loadData();
            } catch (err) {}
        }

        window.updateMarquee = async function() {
            const text = document.getElementById('marquee-input').value;
            try {
                await apiCall('/api/admin', 'POST', { marqueeText: text });
                showToast('Notification updated globally', 'success');
                await loadData();
            } catch(err) {}
        }

        // Handle Approve/Reject Requests (Admin)
        // This triggers the server logic to deduct from Admin and credit to User automatically
        window.handleRequest = async function(requestId, userId, amount, action) {
            try {
                await apiCall('/api/requests', 'PUT', { requestId, userId, amount, action });
                showToast(`Request ${action}d successfully`, 'success');
                await loadData(); // Instantly refreshes balances and tables
            } catch (err) {}
        }

        /* --- User Actions --- */
        window.requestFunds = async function() {
            const amt = parseInt(document.getElementById('request-amount').value);
            if (!amt || amt <= 0) return showToast('Enter a valid amount', 'error');
            
            try {
                await apiCall('/api/requests', 'POST', { userId: currentUser.id, amount: amt });
                showToast('Fund request sent instantly to Admin', 'success');
                document.getElementById('request-amount').value = '';
            } catch (err) {}
        }

        // Initialize App
        async function init() {
            if (currentUser) {
                await loadData();
            } else {
                render();
            }
        }
        
        // Background Polling: Auto-refresh the dashboard every 10 seconds if Admin
        // This keeps checking the fund_requests table for new pending requests.
        setInterval(() => {
            if (currentUser && currentUser.role === 'admin') {
                // Fetch in the background using native fetch to avoid showing the full screen spinner
                fetch('/api/requests')
                    .then(res => res.json())
                    .then(data => {
                        // If the number of requests changed, update data and render quietly
                        if (JSON.stringify(data.requests) !== JSON.stringify(fundRequests)) {
                            fundRequests = data.requests;
                            render();
                        }
                    }).catch(err => console.error(err));
            }
        }, 10000);

        // Start App
        init();

    </script>
</body>
</html>
