<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratheek Enterprises - Subagent Portal</title>
    
    <!-- Premium Font for Business Identity -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Configure Tailwind to use the premium font -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        /* =======================================================
           PREMIUM BUSINESS IDENTITY STYLES (GLASSMORPHISM)
           ======================================================= */

        .animated-bg {
            background: linear-gradient(-45deg, #f0f4ff, #e0e7ff, #f8fafc, #dbeafe);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px -10px rgba(31, 38, 135, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px -10px rgba(31, 38, 135, 0.15);
        }

        .glass-card-dark {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.3);
        }

        .glass-nav {
            background: rgba(30, 58, 138, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 0.8); }

        input, textarea {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9) !important;
        }
        input:focus, textarea:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3) !important;
            border-color: #3b82f6 !important;
        }
        button { transition: all 0.2s ease-in-out; }
        button:active { transform: scale(0.97); }

        .glass-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
        }

        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            background: rgba(250, 204, 21, 0.9);
            backdrop-filter: blur(10px);
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 50; }
        .toast {
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* Custom Radio Buttons for FRC */
        input[type="radio"]:checked + div {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="text-gray-800 font-sans min-h-screen animated-bg">

    <div id="toast-container" class="flex flex-col gap-3"></div>

    <div id="loading-overlay" class="glass-overlay flex flex-col items-center justify-center">
        <i data-lucide="loader" class="animate-spin w-12 h-12 text-blue-600 mb-3 drop-shadow-lg"></i>
        <p class="text-blue-900 font-bold tracking-wide">Processing Securely...</p>
    </div>

    <div id="app"></div>

    <script>
        /* ==========================================
           STATE MANAGEMENT & API WRAPPERS
           ========================================== */
        
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let adminData = { adminWallet: 0, marqueeText: 'Loading...', transactions: [] };
        let usersData = [];
        let fundRequests = [];
        let rechargeRequests = []; // NEW: Stores live recharges

        function setLoading(isLoading) {
            document.getElementById('loading-overlay').style.display = isLoading ? 'flex' : 'none';
        }

        function formatCurrency(amount) {
            return Number(amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bg = type === 'error' ? 'bg-red-600/90' : type === 'success' ? 'bg-green-600/90' : 'bg-blue-600/90';
            
            toast.className = `toast ${bg} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 font-semibold transform translate-x-full opacity-0`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-5 h-5"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
                toast.classList.add('translate-x-0', 'opacity-100');
            }, 10);

            setTimeout(() => {
                toast.classList.remove('translate-x-0', 'opacity-100');
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = { 
                method, 
                headers: { 'Content-Type': 'application/json' } 
            };
            if (body) options.body = JSON.stringify(body);
            
            setLoading(true);
            try {
                const res = await fetch(endpoint, options);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server error occurred');
                return data;
            } catch (err) {
                showToast(err.message, 'error');
                throw err;
            } finally {
                setLoading(false);
            }
        }

        async function loadData() {
            if (!currentUser) return;
            try {
                const [adminRes, usersRes] = await Promise.all([
                    apiCall('/api/admin'),
                    apiCall('/api/users')
                ]);
                
                adminData = adminRes;
                usersData = usersRes.users;

                if (currentUser.role === 'admin') {
                    const reqRes = await apiCall('/api/requests');
                    fundRequests = reqRes.requests;

                    // Fetch live recharge requests
                    const rechargeRes = await apiCall('/api/recharge');
                    rechargeRequests = rechargeRes.requests;
                }
                
                if (currentUser.role === 'user') {
                    const freshUser = usersData.find(u => u.id === currentUser.id);
                    if (freshUser) {
                        currentUser.balance = freshUser.balance;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    } else {
                        // User was deleted by admin
                        logout();
                        return;
                    }
                }
                
                render();
            } catch (error) {
                console.error("Failed to load data:", error);
            }
        }

        /* ==========================================
           RENDERING LOGIC
           ========================================== */
        
        const app = document.getElementById('app');

        function render() {
            if (!currentUser) {
                renderLogin();
            } else if (currentUser.role === 'admin') {
                renderAdminDashboard();
            } else {
                renderUserDashboard();
            }
            lucide.createIcons();
        }

        /* --- LOGIN VIEW --- */
        function renderLogin() {
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="glass-card p-10 rounded-3xl w-full max-w-md animate-fade-in border-t-4 border-t-blue-600">
                        <div class="text-center mb-8">
                            <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner">
                                <i data-lucide="building-2" class="text-blue-600 w-8 h-8"></i>
                            </div>
                            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Pratheek Enterprises</h1>
                            <p class="text-gray-500 font-medium mt-2">Secure Subagent Portal</p>
                        </div>
                        <form id="login-form" class="space-y-5">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Username</label>
                                <input type="text" id="username" class="block w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none" required placeholder="Enter your username">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                                <input type="password" id="password" class="block w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none" required placeholder="••••••••">
                            </div>
                            <button type="submit" class="w-full py-3 px-4 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all mt-4">
                                Secure Login
                            </button>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                try {
                    const data = await apiCall('/api/login', 'POST', { username, password });
                    if (data.success) {
                        currentUser = data.user;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        showToast(`Welcome back, ${currentUser.username}`, 'success');
                        await loadData();
                    }
                } catch (e) { }
            });
        }

        /* --- ADMIN DASHBOARD --- */
        function renderAdminDashboard() {
            let usersHtml = usersData.map(u => `
                <tr class="border-b border-gray-100 hover:bg-black/5 transition-colors">
                    <td class="px-5 py-4 font-bold text-gray-800">${u.username}</td>
                    <td class="px-5 py-4 font-black text-green-600">₹${formatCurrency(u.balance)}</td>
                    <td class="px-5 py-4 flex gap-2">
                        <button onclick="handleCreditDebit(${u.id}, '${u.username}', 'Credit')" class="bg-green-100 text-green-700 px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-green-200 shadow-sm transition-colors">Credit</button>
                        <button onclick="handleCreditDebit(${u.id}, '${u.username}', 'Debit')" class="bg-red-100 text-red-700 px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-red-200 shadow-sm transition-colors">Debit</button>
                        <button onclick="handleDeleteUser(${u.id}, '${u.username}')" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm hover:bg-gray-300 shadow-sm transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');
            if(usersHtml === '') usersHtml = '<tr><td colspan="3" class="p-6 text-center text-gray-500 font-medium">No subagents active. Add one below.</td></tr>';

            let transactionsHtml = adminData.transactions.map(t => {
                const date = new Date(t.created_at).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
                return `
                <tr class="border-b border-gray-100 hover:bg-black/5 transition-colors">
                    <td class="px-5 py-3 text-xs text-gray-500 font-semibold">${date}</td>
                    <td class="px-5 py-3 font-bold text-gray-800">${t.user || 'System'}</td>
                    <td class="px-5 py-3"><span class="px-3 py-1 inline-flex text-xs font-bold rounded-full ${t.type === 'Credit' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${t.type}</span></td>
                    <td class="px-5 py-3 font-black ${t.type === 'Credit' ? 'text-green-600' : 'text-red-600'}">₹${formatCurrency(t.amount)}</td>
                    <td class="px-5 py-3 text-sm text-gray-600 font-medium">${t.description}</td>
                </tr>
            `}).join('');
            if(transactionsHtml === '') transactionsHtml = '<tr><td colspan="5" class="p-6 text-center text-gray-500 font-medium">No transactions recorded yet.</td></tr>';

            let requestsHtml = fundRequests.map(r => `
                <div class="bg-white/60 p-4 rounded-xl border border-yellow-200/50 mb-3 shadow-sm backdrop-blur-md">
                    <div class="text-sm mb-3">
                        <span class="font-bold text-gray-900">${r.username}</span> requested <span class="font-black text-green-600 bg-green-100 px-2 py-0.5 rounded">₹${formatCurrency(r.amount)}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="handleRequest(${r.id}, ${r.user_id}, ${r.amount}, 'approve')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-green-700 flex-1 transition-all shadow-md shadow-green-600/20">Approve</button>
                        <button onclick="handleRequest(${r.id}, ${r.user_id}, ${r.amount}, 'reject')" class="bg-red-100 text-red-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-200 transition-all">Reject</button>
                    </div>
                </div>
            `).join('') || '<p class="text-gray-500 text-sm text-center py-4 bg-black/5 rounded-xl border border-dashed border-gray-300 font-medium">No pending fund requests.</p>';

            // Live Recharge Requests
            let rechargeHtml = rechargeRequests.map(r => `
                <div class="bg-white/60 p-4 rounded-xl border border-blue-200/50 mb-3 shadow-sm backdrop-blur-md">
                    <div class="text-sm mb-3 text-gray-700">
                        <span class="font-bold text-gray-900">${r.username}</span> recharging <span class="font-black text-blue-600 tracking-wider">${r.phone}</span><br>
                        <span class="text-xs bg-gray-100 px-2 py-1 rounded inline-block mt-1 mb-2 font-bold">${r.plan_desc}</span><br>
                        OTF to credit: <span class="font-black text-green-600">₹${formatCurrency(r.otf_amount)}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="handleRechargeAdmin(${r.id}, ${r.user_id}, ${r.plan_price}, ${r.otf_amount}, 'approve')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-700 flex-[2] transition-all shadow-md shadow-blue-600/20">Credit OTF</button>
                        <button onclick="handleRechargeAdmin(${r.id}, ${r.user_id}, ${r.plan_price}, ${r.otf_amount}, 'reject')" class="bg-red-100 text-red-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-200 flex-1 transition-all">Fail (Refund)</button>
                    </div>
                </div>
            `).join('') || '<p class="text-gray-500 text-sm text-center py-4 bg-black/5 rounded-xl border border-dashed border-gray-300 font-medium">No pending recharges.</p>';

            app.innerHTML = `
                <nav class="glass-nav text-white p-4 shadow-lg sticky top-0 z-40">
                    <div class="max-w-7xl mx-auto flex justify-between items-center">
                        <h1 class="text-xl font-extrabold flex items-center gap-3 tracking-wide"><div class="bg-white/20 p-1.5 rounded-lg"><i data-lucide="shield-check" class="w-5 h-5"></i></div> Admin Workspace</h1>
                        <button onclick="logout()" class="flex items-center gap-2 hover:bg-white/10 px-4 py-2 rounded-xl transition-all font-semibold text-sm"><i data-lucide="log-out" class="w-4 h-4"></i> Sign Out</button>
                    </div>
                </nav>

                <div class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
                    <!-- Left Column -->
                    <div class="lg:col-span-2 space-y-6">
                        <!-- Admin Wallet Card -->
                        <div class="glass-card p-8 rounded-3xl animate-fade-in" style="animation-delay: 0.1s;">
                            <h2 class="text-sm font-bold mb-2 flex items-center gap-2 text-gray-500 uppercase tracking-widest"><i data-lucide="wallet" class="text-blue-500 w-4 h-4"></i> Master Treasury</h2>
                            <div class="text-5xl font-black text-gray-900 mb-6 tracking-tight">₹${formatCurrency(adminData.adminWallet)}</div>
                            <div class="flex gap-3 bg-black/5 p-2 rounded-2xl border border-white/50">
                                <input type="number" step="0.01" id="admin-wallet-amount" placeholder="Amount (₹)" class="border-none bg-white p-3 rounded-xl flex-1 focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                                <button onclick="updateAdminWallet('add')" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md transition-all">Add</button>
                                <button onclick="updateAdminWallet('remove')" class="bg-gray-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-gray-900 shadow-md transition-all">Withdraw</button>
                            </div>
                        </div>

                        <!-- User Management -->
                        <div class="glass-card p-8 rounded-3xl animate-fade-in" style="animation-delay: 0.2s;">
                            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-gray-800"><i data-lucide="users" class="text-blue-500"></i> Manage Subagents</h2>
                            <form id="add-user-form" class="flex gap-3 mb-6 bg-black/5 p-2 rounded-2xl border border-white/50">
                                <input type="text" id="new-username" placeholder="Subagent Username" class="border-none bg-white p-3 rounded-xl flex-1 outline-none font-medium" required>
                                <input type="text" id="new-password" placeholder="Secure Password" class="border-none bg-white p-3 rounded-xl flex-1 outline-none font-medium" required>
                                <button type="submit" class="bg-gray-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-black shadow-md transition-all">Create</button>
                            </form>
                            <div class="overflow-hidden border border-gray-100 rounded-2xl bg-white/50">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-black/5 text-gray-500 text-xs uppercase tracking-wider">
                                            <th class="px-5 py-4 font-bold">Agent Name</th>
                                            <th class="px-5 py-4 font-bold">Ledger Balance</th>
                                            <th class="px-5 py-4 font-bold">Controls</th>
                                        </tr>
                                    </thead>
                                    <tbody>${usersHtml}</tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Transaction History -->
                        <div class="glass-card p-8 rounded-3xl animate-fade-in" style="animation-delay: 0.3s;">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-xl font-bold flex items-center gap-2 text-gray-800"><i data-lucide="history" class="text-blue-500"></i> Ledger History</h2>
                                <button onclick="loadData()" class="text-blue-600 hover:bg-blue-50 font-bold flex items-center gap-2 text-sm bg-white px-4 py-2 rounded-xl shadow-sm border border-blue-100 transition-all"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Sync</button>
                            </div>
                            <div class="overflow-x-auto h-96 overflow-y-auto border border-gray-100 rounded-2xl bg-white/50 relative">
                                <table class="w-full text-left border-collapse text-sm">
                                    <thead class="sticky top-0 bg-gray-50 shadow-sm z-10">
                                        <tr class="text-gray-500 text-xs uppercase tracking-wider">
                                            <th class="px-5 py-4 font-bold">Timestamp</th>
                                            <th class="px-5 py-4 font-bold">Entity</th>
                                            <th class="px-5 py-4 font-bold">Flow</th>
                                            <th class="px-5 py-4 font-bold">Amount</th>
                                            <th class="px-5 py-4 font-bold">Notes</th>
                                        </tr>
                                    </thead>
                                    <tbody>${transactionsHtml}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="space-y-6">

                        <!-- Recharge Requests -->
                        <div class="glass-card p-8 rounded-3xl animate-fade-in relative overflow-hidden" style="animation-delay: 0.15s;">
                            <div class="absolute top-0 left-0 w-32 h-32 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-gray-800 relative z-10"><i data-lucide="smartphone" class="text-blue-500"></i> Live Recharges</h2>
                            <div class="max-h-80 overflow-y-auto pr-2 relative z-10">
                                ${rechargeHtml}
                            </div>
                        </div>

                        <!-- Fund Requests -->
                        <div class="glass-card p-8 rounded-3xl animate-fade-in relative overflow-hidden" style="animation-delay: 0.20s;">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-gray-800 relative z-10"><i data-lucide="bell-ring" class="text-yellow-500"></i> Wallet Requests</h2>
                            <div class="max-h-80 overflow-y-auto pr-2 relative z-10">
                                ${requestsHtml}
                            </div>
                        </div>

                        <!-- Notification Settings -->
                        <div class="glass-card p-8 rounded-3xl animate-fade-in" style="animation-delay: 0.25s;">
                            <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-gray-800"><i data-lucide="broadcast" class="text-blue-500"></i> Global Announcement</h2>
                            <textarea id="marquee-input" class="w-full border-none bg-white p-4 rounded-2xl h-32 mb-4 outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium shadow-inner resize-none">${adminData.marqueeText}</textarea>
                            <button onclick="updateMarquee()" class="w-full bg-gray-900 text-white px-4 py-3 rounded-xl font-bold hover:bg-black shadow-lg transition-all">Broadcast Message</button>
                        </div>

                    </div>
                </div>
            `;

            document.getElementById('add-user-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('new-username').value;
                const password = document.getElementById('new-password').value;
                try {
                    await apiCall('/api/users', 'POST', { username, password });
                    showToast('Subagent credential created', 'success');
                    await loadData();
                } catch (err) {}
            });
        }

        /* --- USER DASHBOARD --- */
        function renderUserDashboard() {
            const userTx = adminData.transactions.filter(t => t.user === currentUser.username);
            
            let userTransactionsHtml = userTx.map(t => {
                const date = new Date(t.created_at).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
                const isIncoming = t.type === 'Credit';
                
                return `
                <tr class="border-b border-gray-100 hover:bg-black/5 transition-colors">
                    <td class="px-5 py-4 text-xs text-gray-500 font-semibold">${date}</td>
                    <td class="px-5 py-4">
                        <span class="px-3 py-1 inline-flex text-xs font-bold rounded-full ${isIncoming ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${isIncoming ? 'Inbound' : 'Outbound'}
                        </span>
                    </td>
                    <td class="px-5 py-4 font-black ${isIncoming ? 'text-green-600' : 'text-red-600'}">
                        ${isIncoming ? '+' : '-'}₹${formatCurrency(t.amount)}
                    </td>
                    <td class="px-5 py-4 text-sm text-gray-600 font-medium">${t.description}</td>
                </tr>

            app.innerHTML = `
                <div class="marquee-container text-yellow-900 py-2.5 font-bold shadow-md border-b border-yellow-500/30 text-sm tracking-wide">
                    <div class="marquee-content w-full">${adminData.marqueeText}</div>

                <nav class="glass-nav text-white p-4 shadow-lg sticky top-0 z-40">
                    <div class="max-w-6xl mx-auto flex justify-between items-center">
                        <h1 class="text-xl font-extrabold flex items-center gap-3 tracking-wide">
                            <div class="bg-white/20 p-1.5 rounded-lg"><i data-lucide="user-circle" class="w-5 h-5"></i></div> 
                            ${currentUser.username}
                        </h1>
                        <button onclick="logout()" class="flex items-center gap-2 hover:bg-white/10 px-4 py-2 rounded-xl transition-all font-semibold text-sm"><i data-lucide="log-out" class="w-4 h-4"></i> Sign Out</button>
                    </div>
                </nav>

                <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-8 mt-8">
                    
                    <!-- Wallet Info Column -->
                    <div class="md:col-span-1 space-y-6">
                        
                        <!-- Balance Card -->
                        <div class="glass-card p-8 rounded-3xl text-center relative overflow-hidden animate-fade-in" style="animation-delay: 0.1s;">
                            <div class="absolute -top-10 -right-10 w-40 h-40 bg-green-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                            
                            <h2 class="text-gray-500 font-bold mb-3 uppercase text-xs tracking-widest relative z-10">Available Balance</h2>
                            <div class="text-5xl font-black text-gray-900 mb-8 drop-shadow-sm relative z-10 tracking-tight">₹${formatCurrency(currentUser.balance)}</div>
                            
                            <div class="bg-white/80 p-5 rounded-2xl border border-white relative z-10 shadow-sm">
                                <h3 class="font-extrabold text-gray-800 mb-4 text-sm text-left flex items-center gap-2"><i data-lucide="hand-coins" class="w-4 h-4 text-blue-600"></i> Requisition Funds</h3>
                                <div class="flex flex-col gap-3">
                                    <input type="number" step="0.01" id="request-amount" placeholder="Amount Required (₹)" class="border-none bg-black/5 p-3 rounded-xl w-full outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                                    <button onclick="requestFunds()" class="bg-blue-600 text-white px-4 py-3 rounded-xl font-bold hover:bg-blue-700 w-full flex justify-center items-center gap-2 transition-all shadow-lg shadow-blue-600/30">
                                        Submit Request <i data-lucide="arrow-right" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- NEW: Mobile Recharge Module -->
                        <div class="glass-card p-6 rounded-3xl relative overflow-hidden animate-fade-in" style="animation-delay: 0.15s;">
                            <h3 class="font-extrabold text-gray-800 mb-4 text-sm text-left flex items-center gap-2"><i data-lucide="smartphone" class="w-4 h-4 text-blue-600"></i> FRC Mobile Recharge</h3>
                            
                            <!-- Step 1: Phone Entry -->
                            <div id="recharge-step-1">
                                <input type="tel" id="recharge-phone" placeholder="Enter Mobile Number" class="border-none bg-white p-3 rounded-xl w-full outline-none focus:ring-2 focus:ring-blue-500 font-bold mb-3 border border-gray-100 shadow-inner">
                                <button onclick="showRechargePlans()" class="bg-gray-900 text-white px-4 py-3 rounded-xl font-bold hover:bg-black w-full flex justify-center items-center gap-2 transition-all shadow-lg">Next <i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                            </div>

                            <!-- Step 2: Plan Selection -->
                            <div id="recharge-step-2" class="hidden">
                                <p class="text-xs font-bold text-gray-500 mb-3">Select FRC for <span id="display-phone" class="text-blue-600 tracking-wider"></span></p>
                                
                                <div class="space-y-2 mb-4">
                                    <label class="block relative p-3 border border-gray-200 bg-white rounded-xl cursor-pointer hover:border-blue-400 transition-all">
                                        <div class="flex items-center gap-3">
                                            <input type="radio" name="recharge-plan" value="365|135|365 UL DATA+Calls 28D" class="w-4 h-4 text-blue-600" required>
                                            <div class="flex-1">
                                                <div class="font-bold text-sm text-gray-900">₹365 UL DATA+Calls 28D</div>
                                                <div class="text-xs text-green-600 font-bold mt-0.5">OTF: ₹135</div>
                                            </div>
                                        </div>
                                    </label>
                                    
                                    <label class="block relative p-3 border border-gray-200 bg-white rounded-xl cursor-pointer hover:border-blue-400 transition-all">
                                        <div class="flex items-center gap-3">
                                            <input type="radio" name="recharge-plan" value="299|89|299 UL calls+1.5GB/D 28D" class="w-4 h-4 text-blue-600">
                                            <div class="flex-1">
                                                <div class="font-bold text-sm text-gray-900">₹299 UL calls+1.5GB/D 28D</div>
                                                <div class="text-xs text-green-600 font-bold mt-0.5">OTF: ₹89</div>
                                            </div>
                                        </div>
                                    </label>

                                    <label class="block relative p-3 border border-gray-200 bg-white rounded-xl cursor-pointer hover:border-blue-400 transition-all">
                                        <div class="flex items-center gap-3">
                                            <input type="radio" name="recharge-plan" value="199|30|199 UL Calls+2GB 28D" class="w-4 h-4 text-blue-600">
                                            <div class="flex-1">
                                                <div class="font-bold text-sm text-gray-900">₹199 UL Calls+2GB 28D</div>
                                                <div class="text-xs text-green-600 font-bold mt-0.5">OTF: ₹30</div>
                                            </div>
                                        </div>
                                    </label>
                                </div>

                                <div class="flex gap-2">
                                    <button onclick="cancelRecharge()" class="bg-gray-200 text-gray-700 px-4 py-3 rounded-xl font-bold hover:bg-gray-300 transition-all flex-[1]">Back</button>
                                    <button onclick="submitRecharge()" class="bg-green-600 text-white px-4 py-3 rounded-xl font-bold hover:bg-green-700 transition-all shadow-lg shadow-green-600/30 flex-[2]">Recharge</button>
                                </div>
                            </div>
                        </div>

                        <!-- Admin Contact -->
                        <div class="glass-card-dark text-white p-8 rounded-3xl relative overflow-hidden animate-fade-in" style="animation-delay: 0.2s;">
                            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-blue-500 rounded-full mix-blend-overlay filter blur-3xl opacity-30"></div>
                            <h2 class="text-lg font-bold mb-5 flex items-center gap-3 border-b border-white/10 pb-4 relative z-10"><i data-lucide="headset" class="text-blue-400"></i> Priority Support</h2>
                            <p class="text-sm mb-6 text-gray-300 relative z-10 leading-relaxed font-medium">Dedicated support line for subagent requisitions and technical assistance.</p>

                                <li class="flex items-center gap-4 bg-white/5 p-3 rounded-xl border border-white/5"><div class="bg-white/10 p-2 rounded-lg"><i data-lucide="mail" class="w-4 h-4 text-blue-300"></i></div> pratheek@myyahoo.com</li>
                                <li class="flex items-center gap-4 bg-white/5 p-3 rounded-xl border border-white/5"><div class="bg-white/10 p-2 rounded-lg"><i data-lucide="phone-call" class="w-4 h-4 text-green-300"></i></div> +91 9164132150</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Transaction History Column -->
                    <div class="md:col-span-2">

                                <h2 class="text-xl font-bold flex items-center gap-2 text-gray-800"><i data-lucide="book-open" class="text-blue-600"></i> Statement of Account</h2>
                                <button onclick="loadData()" class="text-blue-600 hover:bg-blue-50 font-bold flex items-center gap-2 text-sm bg-white px-4 py-2 rounded-xl shadow-sm border border-blue-100 transition-all"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Sync</button>

                                            <th class="px-5 py-4 font-bold">Direction</th>
                                            <th class="px-5 py-4 font-bold">Amount</th>
                                            <th class="px-5 py-4 font-bold">Reference</th>

                            </div>
                        </div>
                    </div>

                </div>
            `;
        }

        /* ==========================================
           ACTION HANDLERS
           ========================================== */

        window.logout = function() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            showToast('Securely logged out');
            render();
        }

        /* --- Admin Actions --- */
        window.updateAdminWallet = async function(action) {
            const amt = document.getElementById('admin-wallet-amount').value;
            if (!amt || parseFloat(amt) <= 0) return showToast('Enter a valid amount', 'error');
            try {
                await apiCall('/api/admin', 'PUT', { amount: amt, action });
                showToast(`Treasury updated successfully`, 'success');
                document.getElementById('admin-wallet-amount').value = '';
                await loadData();
            } catch (err) {}
        }

        window.handleCreditDebit = async function(userId, username, type) {
            const rawAmt = prompt(`Enter amount to ${type} for ${username} (e.g. 100.50):`);
            if (rawAmt === null) return; 
            const amt = parseFloat(rawAmt);
            if (isNaN(amt) || amt <= 0) return showToast('Invalid amount', 'error');

            try {
                await apiCall('/api/wallet', 'POST', { userId, amount: amt, action: type, description: `Manual ${type.toLowerCase()} by Admin` });
                showToast(`Successfully processed ₹${formatCurrency(amt)} for ${username}`, 'success');
                await loadData();
            } catch(err) {}
        }

        window.handleDeleteUser = async function(userId, username) {
            if (!confirm(`Revoke access for ${username}? Remaining balance will route to Treasury.`)) return;
            try {
                const res = await apiCall(`/api/users?id=${userId}`, 'DELETE');
                showToast(`Access revoked. ₹${formatCurrency(res.refunded || 0)} secured.`, 'info');
                await loadData();
            } catch (err) {}
        }

        window.updateMarquee = async function() {
            const text = document.getElementById('marquee-input').value;
            try {
                await apiCall('/api/admin', 'POST', { marqueeText: text });
                showToast('Global broadcast updated', 'success');
                await loadData();
            } catch(err) {}
        }

        window.handleRequest = async function(requestId, userId, amount, action) {
            try {
                await apiCall('/api/requests', 'PUT', { requestId, userId, amount, action });
                showToast(`Requisition ${action}d successfully`, 'success');
                await loadData(); 
            } catch (err) {}
        }

        window.handleRechargeAdmin = async function(requestId, userId, planPrice, otfAmount, action) {
            try {
                await apiCall('/api/recharge', 'PUT', { requestId, userId, planPrice, otfAmount, action });
                showToast(`Recharge ${action === 'approve' ? 'commission credited' : 'failed and refunded'}`, 'success');
                await loadData(); 
            } catch (err) {}
        }

        /* --- User Actions --- */
        window.requestFunds = async function() {
            const amtRaw = document.getElementById('request-amount').value;
            const amt = parseFloat(amtRaw);
            if (isNaN(amt) || amt <= 0) return showToast('Enter a valid amount', 'error');
            try {
                await apiCall('/api/requests', 'POST', { userId: currentUser.id, amount: amt });
                showToast('Requisition transmitted to Admin', 'success');
                document.getElementById('request-amount').value = '';
            } catch (err) {}
        }

        // Recharge UI Logic
        window.showRechargePlans = function() {
            const phone = document.getElementById('recharge-phone').value;
            if(!phone || phone.length < 10) return showToast('Enter a valid 10-digit mobile number', 'error');
            
            document.getElementById('display-phone').innerText = phone;
            document.getElementById('recharge-step-1').classList.add('hidden');
            document.getElementById('recharge-step-2').classList.remove('hidden');
        }

        window.cancelRecharge = function() {
            document.getElementById('recharge-step-2').classList.add('hidden');
            document.getElementById('recharge-step-1').classList.remove('hidden');
        }

        window.submitRecharge = async function() {
            const phone = document.getElementById('recharge-phone').value;
            const selectedPlan = document.querySelector('input[name="recharge-plan"]:checked');
            
            if(!selectedPlan) return showToast('Please select a recharge plan', 'error');

            const [planPrice, otfAmount, planDesc] = selectedPlan.value.split('|');

            if(currentUser.balance < parseFloat(planPrice)) {
                return showToast(`Insufficient balance. You need ₹${planPrice} for this plan.`, 'error');
            }

            try {
                await apiCall('/api/recharge', 'POST', { 
                    userId: currentUser.id, 
                    phone, 
                    planPrice: parseFloat(planPrice), 
                    otfAmount: parseFloat(otfAmount), 
                    planDesc 
                });
                
                showToast(`Recharge initiated! ₹${planPrice} deducted.`, 'success');
                await loadData(); 
            } catch (err) {}
        }

        // Initialize App
        async function init() {
            if (currentUser) { await loadData(); } else { render(); }
        }
        
        // Background Polling
        setInterval(() => {
            if (currentUser && currentUser.role === 'admin') {
                fetch('/api/requests').then(res => res.json()).then(data => {
                    if (JSON.stringify(data.requests) !== JSON.stringify(fundRequests)) {
                        fundRequests = data.requests; render();
                    }
                }).catch(err => console.error(err));
                
                fetch('/api/recharge').then(res => res.json()).then(data => {
                    if (JSON.stringify(data.requests) !== JSON.stringify(rechargeRequests)) {
                        rechargeRequests = data.requests; render();
                    }
                }).catch(err => console.error(err));
            }
        }, 10000);

        init();

    </script>
</body>
