<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratheek Enterprises - Subagent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
                            500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554',
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Marquee Animation - Modernized */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            display: flex;
            align-items: center;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 20s linear infinite;
            padding-left: 100%;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Toast Notification System - Modernized */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading Overlay - Modernized */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        /* Custom Scrollbar for tables */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* Entrance animations */
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- Loading Spinner -->
    <div id="loading-overlay">
        <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center gap-3 border border-slate-100">
            <i data-lucide="loader-2" class="animate-spin w-8 h-8 text-brand-600"></i>
            <p class="text-slate-600 font-medium text-sm tracking-wide">Processing request...</p>
        </div>
    </div>

    <!-- Main Application Container -->
    <div id="app" class="flex-grow flex flex-col"></div>

    <script>
        /* ==========================================
           STATE MANAGEMENT & API WRAPPERS (UNCHANGED)
           ========================================== */
        
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let adminData = { adminWallet: 0, marqueeText: 'Loading...', transactions: [] };
        let usersData = [];
        let fundRequests = [];

        function setLoading(isLoading) {
            document.getElementById('loading-overlay').style.display = isLoading ? 'flex' : 'none';
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // Modernized Toast Styling
            const baseClasses = 'px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 border min-w-[280px] max-w-md bg-white';
            const typeClasses = type === 'error' ? 'border-red-100 text-red-700 shadow-red-500/10' : 
                              type === 'success' ? 'border-emerald-100 text-emerald-700 shadow-emerald-500/10' : 
                              'border-brand-100 text-brand-700 shadow-brand-500/10';
            
            const icon = type === 'error' ? 'alert-circle' : type === 'success' ? 'check-circle-2' : 'info';
            const iconColor = type === 'error' ? 'text-red-500' : type === 'success' ? 'text-emerald-500' : 'text-brand-500';
            
            toast.className = `toast ${baseClasses} ${typeClasses}`;
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-5 h-5 ${iconColor}"></i> 
                <span class="text-sm font-medium">${message}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = { 
                method, 
                headers: { 'Content-Type': 'application/json' } 
            };
            if (body) options.body = JSON.stringify(body);
            
            setLoading(true);
            try {
                const res = await fetch(endpoint, options);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server error occurred');
                return data;
            } catch (err) {
                showToast(err.message, 'error');
                throw err;
            } finally {
                setLoading(false);
            }
        }

        async function loadData() {
            if (!currentUser) return;
            try {
                const [adminRes, usersRes] = await Promise.all([
                    apiCall('/api/admin'),
                    apiCall('/api/users')
                ]);
                
                adminData = adminRes;
                usersData = usersRes.users;

                if (currentUser.role === 'admin') {
                    const reqRes = await apiCall('/api/requests');
                    fundRequests = reqRes.requests;
                }
                
                if (currentUser.role === 'user') {
                    const freshUser = usersData.find(u => u.id === currentUser.id);
                    if (freshUser) {
                        currentUser.balance = freshUser.balance;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    } else {
                        logout();
                        return;
                    }
                }
                
                render();
            } catch (error) {
                console.error("Failed to load data:", error);
            }
        }

        /* ==========================================
           RENDERING LOGIC (MODERNIZED UI)
           ========================================== */
        
        const app = document.getElementById('app');

        function render() {
            if (!currentUser) {
                renderLogin();
            } else if (currentUser.role === 'admin') {
                renderAdminDashboard();
            } else {
                renderUserDashboard();
            }
            lucide.createIcons();
        }

        /* --- LOGIN VIEW --- */
        function renderLogin() {
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-slate-50 p-4 relative overflow-hidden">
                    <!-- Decorative backgrounds -->
                    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-brand-200/40 blur-3xl"></div>
                    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-200/40 blur-3xl"></div>
                    
                    <div class="bg-white/80 backdrop-blur-xl p-8 rounded-3xl shadow-soft border border-white w-full max-w-md relative z-10 fade-in-up">
                        <div class="text-center mb-10">
                            <div class="w-16 h-16 bg-brand-100 rounded-2xl flex items-center justify-center mx-auto mb-4 text-brand-600 shadow-inner-soft">
                                <i data-lucide="briefcase" class="w-8 h-8"></i>
                            </div>
                            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-900 to-brand-600 tracking-tight">Pratheek Enterprises</h1>
                            <p class="text-slate-500 text-sm mt-2 font-medium">Secure Subagent Portal</p>
                        </div>
                        <form id="login-form" class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i data-lucide="user" class="w-5 h-5 text-slate-400"></i>
                                    </div>
                                    <input type="text" id="username" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 block w-full pl-10 p-3 transition-all outline-none shadow-inner-soft" placeholder="Enter your username" required>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                                    </div>
                                    <input type="password" id="password" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 block w-full pl-10 p-3 transition-all outline-none shadow-inner-soft" placeholder="••••••••" required>
                                </div>
                            </div>
                            <button type="submit" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all active:scale-[0.98] mt-4">
                                Sign In <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                try {
                    const data = await apiCall('/api/login', 'POST', { username, password });
                    if (data.success) {
                        currentUser = data.user;
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        showToast(`Welcome back, ${currentUser.username}`, 'success');
                        await loadData();
                    }
                } catch (e) {
                    // Handled by apiCall
                }
            });
        }

        /* --- ADMIN DASHBOARD --- */
        function renderAdminDashboard() {
            let usersHtml = usersData.map(u => `
                <tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors group">
                    <td class="px-4 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-brand-100 text-brand-600 flex items-center justify-center font-bold text-sm uppercase">
                                ${u.username.charAt(0)}
                            </div>
                            <span class="font-semibold text-slate-700">${u.username}</span>
                        </div>
                    </td>
                    <td class="px-4 py-4 font-bold text-emerald-600 tracking-wide">₹${Number(u.balance).toLocaleString('en-IN')}</td>
                    <td class="px-4 py-4">
                        <div class="flex gap-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                            <button onclick="handleCreditDebit(${u.id}, '${u.username}', 'Credit')" class="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg text-xs hover:bg-emerald-100 font-semibold border border-emerald-100 transition-colors flex items-center gap-1">
                                <i data-lucide="arrow-up-circle" class="w-3.5 h-3.5"></i> Credit
                            </button>
                            <button onclick="handleCreditDebit(${u.id}, '${u.username}', 'Debit')" class="bg-rose-50 text-rose-600 px-3 py-1.5 rounded-lg text-xs hover:bg-rose-100 font-semibold border border-rose-100 transition-colors flex items-center gap-1">
                                <i data-lucide="arrow-down-circle" class="w-3.5 h-3.5"></i> Debit
                            </button>
                            <button onclick="handleDeleteUser(${u.id}, '${u.username}')" class="bg-slate-100 text-slate-600 px-2 py-1.5 rounded-lg hover:bg-rose-100 hover:text-rose-600 transition-colors ml-auto border border-slate-200" title="Delete User">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            if(usersHtml === '') usersHtml = `
                <tr><td colspan="3" class="p-8 text-center text-slate-400">
                    <div class="flex flex-col items-center gap-2">
                        <i data-lucide="users" class="w-8 h-8 text-slate-300"></i>
                        <p class="text-sm font-medium">No users found. Add your first subagent above!</p>
                    </div>
                </td></tr>`;

            let transactionsHtml = adminData.transactions.map(t => {
                const date = new Date(t.created_at).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                const isCredit = t.type === 'Credit';
                return `
                <tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-3 text-xs text-slate-500 font-medium whitespace-nowrap">${date}</td>
                    <td class="px-4 py-3 font-semibold text-slate-700">${t.user || '<span class="text-slate-400">System</span>'}</td>
                    <td class="px-4 py-3">
                        <span class="px-2.5 py-1 inline-flex text-[11px] leading-4 font-bold rounded-full border ${isCredit ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200'}">
                            ${t.type}
                        </span>
                    </td>
                    <td class="px-4 py-3 font-bold ${isCredit ? 'text-emerald-600' : 'text-rose-600'} text-right whitespace-nowrap">
                        ${isCredit ? '+' : '-'}₹${Number(t.amount).toLocaleString('en-IN')}
                    </td>
                    <td class="px-4 py-3 text-xs text-slate-600 truncate max-w-[200px]" title="${t.description}">${t.description}</td>
                </tr>
            `}).join('');

            if(transactionsHtml === '') transactionsHtml = `
                <tr><td colspan="5" class="p-8 text-center text-slate-400">
                    <div class="flex flex-col items-center gap-2">
                        <i data-lucide="receipt" class="w-8 h-8 text-slate-300"></i>
                        <p class="text-sm font-medium">No transactions recorded yet.</p>
                    </div>
                </td></tr>`;

            let requestsHtml = fundRequests.map(r => `
                <div class="bg-white p-4 rounded-xl border border-amber-200 shadow-sm mb-3 flex flex-col sm:flex-row justify-between sm:items-center gap-3 relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-amber-400"></div>
                    <div class="pl-2">
                        <p class="text-xs text-slate-500 mb-1">Fund Request</p>
                        <div class="text-sm">
                            <span class="font-bold text-slate-800">${r.username}</span> is requesting 
                            <span class="font-bold text-emerald-600 text-base">₹${Number(r.amount).toLocaleString('en-IN')}</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="handleRequest(${r.id}, ${r.user_id}, ${r.amount}, 'approve')" class="flex-1 sm:flex-none bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-emerald-700 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-1.5">
                            <i data-lucide="check" class="w-4 h-4"></i> Approve
                        </button>
                        <button onclick="handleRequest(${r.id}, ${r.user_id}, ${r.amount}, 'reject')" class="flex-1 sm:flex-none bg-white border border-rose-200 text-rose-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-rose-50 active:scale-95 transition-all flex items-center justify-center gap-1.5">
                            <i data-lucide="x" class="w-4 h-4"></i> Reject
                        </button>
                    </div>
                </div>
            `).join('') || `
                <div class="flex flex-col items-center justify-center py-10 px-4 text-center bg-slate-50 rounded-xl border border-dashed border-slate-200">
                    <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mb-3">
                        <i data-lucide="inbox" class="w-6 h-6 text-slate-400"></i>
                    </div>
                    <p class="text-slate-500 font-medium text-sm">All caught up!</p>
                    <p class="text-slate-400 text-xs mt-1">No pending fund requests right now.</p>
                </div>`;

            app.innerHTML = `
                <!-- Navbar -->
                <nav class="bg-slate-900 text-white shadow-lg sticky top-0 z-40 border-b border-slate-800">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between items-center h-16">
                            <div class="flex items-center gap-3">
                                <div class="bg-brand-500 p-1.5 rounded-lg">
                                    <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
                                </div>
                                <h1 class="text-lg font-bold tracking-tight">Admin Control Panel</h1>
                            </div>
                            <button onclick="logout()" class="flex items-center gap-2 text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition-all text-sm font-medium border border-slate-700">
                                <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Logout</span>
                            </button>
                        </div>
                    </div>
                </nav>

                <div class="max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 xl:grid-cols-3 gap-8 fade-in-up">
                    
                    <!-- Left Column (Main Content) -->
                    <div class="xl:col-span-2 space-y-8">
                        
                        <!-- Master Admin Wallet Card -->
                        <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl shadow-xl overflow-hidden relative border border-slate-700">
                            <!-- Decorative circles -->
                            <div class="absolute top-[-50px] right-[-50px] w-[200px] h-[200px] rounded-full bg-white/5 blur-2xl pointer-events-none"></div>
                            
                            <div class="p-8 relative z-10">
                                <div class="flex items-center justify-between mb-6">
                                    <h2 class="text-slate-300 font-medium flex items-center gap-2 tracking-wide uppercase text-sm">
                                        <i data-lucide="wallet" class="w-4 h-4 text-brand-400"></i> Master Wallet Balance
                                    </h2>
                                </div>
                                <div class="text-5xl font-black text-white mb-8 tracking-tight drop-shadow-md">
                                    ₹${Number(adminData.adminWallet).toLocaleString('en-IN')}
                                </div>
                                
                                <div class="flex flex-col sm:flex-row gap-3 bg-slate-800/50 p-2 rounded-2xl backdrop-blur-sm border border-slate-700/50">
                                    <div class="relative flex-1">
                                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <span class="text-slate-400 font-medium">₹</span>
                                        </div>
                                        <input type="number" id="admin-wallet-amount" placeholder="0.00" class="bg-slate-900/50 text-white placeholder-slate-500 border-none w-full pl-8 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition-all font-medium">
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="updateAdminWallet('add')" class="flex-1 sm:flex-none bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-emerald-600 transition-all shadow-lg shadow-emerald-500/20 active:scale-95 flex items-center justify-center gap-2">
                                            <i data-lucide="plus" class="w-4 h-4"></i> Add
                                        </button>
                                        <button onclick="updateAdminWallet('remove')" class="flex-1 sm:flex-none bg-slate-700 text-white px-6 py-3 rounded-xl font-bold hover:bg-rose-500 hover:shadow-lg hover:shadow-rose-500/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                                            <i data-lucide="minus" class="w-4 h-4"></i> Withdraw
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- User Management -->
                        <div class="bg-white rounded-3xl shadow-soft border border-slate-100 p-6 sm:p-8">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <i data-lucide="users" class="w-5 h-5 text-brand-500"></i> Subagents Directory
                                </h2>
                                <span class="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1 rounded-full border border-slate-200">
                                    ${usersData.length} Users
                                </span>
                            </div>
                            
                            <form id="add-user-form" class="flex flex-col sm:flex-row gap-3 mb-8 bg-slate-50 p-2 rounded-2xl border border-slate-200">
                                <div class="relative flex-1">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i data-lucide="user-plus" class="w-4 h-4 text-slate-400"></i>
                                    </div>
                                    <input type="text" id="new-username" placeholder="Username" class="bg-white border-none w-full pl-9 pr-3 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 text-sm font-medium text-slate-700 shadow-sm" required>
                                </div>
                                <div class="relative flex-1">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i data-lucide="key" class="w-4 h-4 text-slate-400"></i>
                                    </div>
                                    <input type="text" id="new-password" placeholder="Password" class="bg-white border-none w-full pl-9 pr-3 py-2.5 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 text-sm font-medium text-slate-700 shadow-sm" required>
                                </div>
                                <button type="submit" class="bg-brand-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-brand-700 shadow-md shadow-brand-500/20 transition-all active:scale-95 whitespace-nowrap">
                                    Create Agent
                                </button>
                            </form>

                            <div class="border border-slate-200 rounded-2xl overflow-hidden bg-white">
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse">
                                        <thead class="bg-slate-50/80 backdrop-blur-sm border-b border-slate-200">
                                            <tr>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Agent Name</th>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Wallet Balance</th>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-100">
                                            ${usersHtml}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- Global Transaction History -->
                        <div class="bg-white rounded-3xl shadow-soft border border-slate-100 p-6 sm:p-8">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <i data-lucide="activity" class="w-5 h-5 text-brand-500"></i> Master Ledger
                                </h2>
                                <button onclick="loadData()" class="text-slate-500 hover:text-brand-600 hover:bg-brand-50 flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors border border-transparent hover:border-brand-100">
                                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Sync
                                </button>
                            </div>
                            <div class="border border-slate-200 rounded-2xl overflow-hidden bg-white">
                                <div class="overflow-x-auto max-h-96 overflow-y-auto relative">
                                    <table class="w-full text-left border-collapse text-sm">
                                        <thead class="sticky top-0 bg-slate-50/95 backdrop-blur shadow-sm z-10">
                                            <tr>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Timestamp</th>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">User</th>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Type</th>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Amount</th>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Details</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-100">
                                            ${transactionsHtml}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column (Sidebar) -->
                    <div class="space-y-8">
                        
                        <!-- Fund Requests -->
                        <div class="bg-white rounded-3xl shadow-soft border border-slate-100 p-6 sm:p-8 relative overflow-hidden">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-amber-100 rounded-bl-full -z-0 opacity-50 pointer-events-none"></div>
                            
                            <div class="flex items-center justify-between mb-6 relative z-10">
                                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <i data-lucide="bell-ring" class="w-5 h-5 text-amber-500"></i> Action Center
                                </h2>
                                ${fundRequests.length > 0 ? `<span class="bg-amber-100 text-amber-700 text-xs font-bold px-2 py-1 rounded-full">${fundRequests.length} New</span>` : ''}
                            </div>
                            
                            <div class="max-h-[400px] overflow-y-auto pr-1 relative z-10 space-y-1">
                                ${requestsHtml}
                            </div>
                        </div>

                        <!-- Notification Settings -->
                        <div class="bg-white rounded-3xl shadow-soft border border-slate-100 p-6 sm:p-8">
                            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2 mb-2">
                                <i data-lucide="megaphone" class="w-5 h-5 text-brand-500"></i> Broadcast Banner
                            </h2>
                            <p class="text-xs text-slate-500 mb-4">Push announcements to all user dashboards instantly.</p>
                            
                            <textarea id="marquee-input" class="w-full bg-slate-50 border border-slate-200 text-slate-800 p-4 rounded-2xl h-28 mb-4 outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white text-sm transition-all resize-none shadow-inner-soft">${adminData.marqueeText}</textarea>
                            
                            <button onclick="updateMarquee()" class="w-full bg-slate-900 text-white px-4 py-3 rounded-xl font-bold hover:bg-slate-800 shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                                <i data-lucide="radio" class="w-4 h-4"></i> Publish Announcement
                            </button>
                        </div>

                    </div>
                </div>
            `;

            // Admin Event Listeners
            document.getElementById('add-user-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('new-username').value;
                const password = document.getElementById('new-password').value;
                
                try {
                    await apiCall('/api/users', 'POST', { username, password });
                    showToast('Subagent created successfully', 'success');
                    await loadData();
                } catch (err) {}
            });
        }

        /* --- USER DASHBOARD --- */
        function renderUserDashboard() {
            const userTx = adminData.transactions.filter(t => t.user === currentUser.username);
            
            let userTransactionsHtml = userTx.map(t => {
                const date = new Date(t.created_at).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                const isIncoming = t.type === 'Credit';
                
                return `
                <tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-4 text-xs text-slate-500 font-medium whitespace-nowrap">${date}</td>
                    <td class="px-4 py-4">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full flex items-center justify-center ${isIncoming ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                <i data-lucide="${isIncoming ? 'arrow-down-left' : 'arrow-up-right'}" class="w-3 h-3"></i>
                            </div>
                            <span class="text-xs font-bold ${isIncoming ? 'text-emerald-700' : 'text-rose-700'}">
                                ${isIncoming ? 'Received' : 'Deducted'}
                            </span>
                        </div>
                    </td>
                    <td class="px-4 py-4 font-bold ${isIncoming ? 'text-emerald-600' : 'text-rose-600'} text-right">
                        ${isIncoming ? '+' : '-'}₹${Number(t.amount).toLocaleString('en-IN')}
                    </td>
                    <td class="px-4 py-4 text-sm text-slate-600">${t.description}</td>
                </tr>
            `}).join('');

            if(userTransactionsHtml === '') userTransactionsHtml = `
                <tr><td colspan="4" class="p-10 text-center text-slate-400">
                    <div class="flex flex-col items-center gap-2">
                        <i data-lucide="ghost" class="w-10 h-10 text-slate-200"></i>
                        <p class="text-sm font-medium mt-2">No transaction history yet.</p>
                    </div>
                </td></tr>`;

            app.innerHTML = `
                <!-- Dynamic Marquee Announcement -->
                <div class="bg-amber-100 text-amber-900 py-2.5 marquee-container font-medium text-sm border-b border-amber-200 shadow-sm z-50">
                    <div class="marquee-content flex gap-8 items-center">
                        <span class="flex items-center gap-2"><i data-lucide="info" class="w-4 h-4"></i> ${adminData.marqueeText}</span>
                    </div>
                </div>

                <!-- Navbar -->
                <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between items-center h-16">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center font-bold text-lg border border-brand-200 shadow-inner-soft uppercase">
                                    ${currentUser.username.charAt(0)}
                                </div>
                                <div>
                                    <h1 class="text-base font-bold text-slate-800 leading-tight">Welcome, ${currentUser.username}</h1>
                                    <p class="text-xs text-slate-500 font-medium">Subagent Portal</p>
                                </div>
                            </div>
                            <button onclick="logout()" class="flex items-center gap-1.5 text-slate-500 hover:text-rose-600 hover:bg-rose-50 px-3 py-1.5 rounded-lg transition-colors text-sm font-semibold border border-transparent hover:border-rose-100">
                                <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Sign Out</span>
                            </button>
                        </div>
                    </div>
                </nav>

                <div class="max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 md:grid-cols-3 gap-8 fade-in-up">
                    
                    <!-- Left Column (Actions & Info) -->
                    <div class="md:col-span-1 space-y-8">
                        
                        <!-- Balance Card -->
                        <div class="bg-white rounded-3xl shadow-soft border border-slate-100 overflow-hidden relative">
                            <!-- Beautiful top accent -->
                            <div class="h-2 w-full bg-gradient-to-r from-emerald-400 to-emerald-600"></div>
                            
                            <div class="p-6 sm:p-8 text-center relative z-10">
                                <div class="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm border border-emerald-100">
                                    <i data-lucide="wallet" class="w-6 h-6"></i>
                                </div>
                                <h2 class="text-slate-500 font-bold uppercase text-xs tracking-widest mb-2">Available Balance</h2>
                                <div class="text-4xl font-black text-slate-800 mb-8 tracking-tight drop-shadow-sm">
                                    ₹${Number(currentUser.balance).toLocaleString('en-IN')}
                                </div>
                                
                                <div class="border-t border-slate-100 pt-6">
                                    <h3 class="font-bold text-slate-700 mb-3 text-sm text-left flex items-center gap-2">
                                        <i data-lucide="arrow-up-circle" class="w-4 h-4 text-brand-500"></i> Request Top-up
                                    </h3>
                                    <div class="flex flex-col gap-3">
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <span class="text-slate-400 font-medium">₹</span>
                                            </div>
                                            <input type="number" id="request-amount" placeholder="0.00" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-2 focus:ring-brand-500 block w-full pl-8 p-3 transition-all outline-none">
                                        </div>
                                        <button onclick="requestFunds()" class="bg-brand-600 text-white px-4 py-3 rounded-xl font-bold text-sm hover:bg-brand-700 shadow-md shadow-brand-500/20 active:scale-95 transition-all flex justify-center items-center gap-2">
                                            Send Request <i data-lucide="send" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Support Contact -->
                        <div class="bg-slate-900 rounded-3xl shadow-soft p-6 sm:p-8 relative overflow-hidden text-white border border-slate-800">
                            <!-- Background abstract shape -->
                            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-brand-500/20 rounded-full blur-3xl"></div>
                            
                            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 pb-3 border-b border-slate-800 relative z-10">
                                <i data-lucide="headset" class="text-brand-400 w-5 h-5"></i> Support Desk
                            </h2>
                            <p class="text-sm text-slate-400 mb-6 relative z-10 leading-relaxed font-medium">
                                Need help with transactions or require a manual top-up? Contact the master admin.
                            </p>
                            
                            <div class="space-y-3 text-sm relative z-10 font-medium text-slate-300">
                                <div class="flex items-center gap-3 bg-slate-800/80 p-3 rounded-xl border border-slate-700 backdrop-blur-sm">
                                    <div class="bg-brand-500/20 p-1.5 rounded-lg text-brand-400">
                                        <i data-lucide="mail" class="w-4 h-4"></i>
                                    </div>
                                    pratheek@myyahoo.com
                                </div>
                                <div class="flex items-center gap-3 bg-slate-800/80 p-3 rounded-xl border border-slate-700 backdrop-blur-sm">
                                    <div class="bg-emerald-500/20 p-1.5 rounded-lg text-emerald-400">
                                        <i data-lucide="phone" class="w-4 h-4"></i>
                                    </div>
                                    +91 9164132150
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column (Passbook) -->
                    <div class="md:col-span-2">
                        <div class="bg-white rounded-3xl shadow-soft border border-slate-100 p-6 sm:p-8 h-full flex flex-col">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                                <div>
                                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        <i data-lucide="book" class="w-5 h-5 text-brand-500"></i> Wallet Passbook
                                    </h2>
                                    <p class="text-sm text-slate-500 font-medium mt-1">Your recent financial activity</p>
                                </div>
                                <button onclick="loadData()" class="bg-slate-50 text-slate-600 hover:text-brand-600 hover:bg-brand-50 px-4 py-2 rounded-xl border border-slate-200 transition-colors text-sm font-bold flex items-center gap-2">
                                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Sync Ledger
                                </button>
                            </div>
                            
                            <div class="border border-slate-200 rounded-2xl flex-grow overflow-hidden bg-white">
                                <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                                    <table class="w-full text-left border-collapse">
                                        <thead class="bg-slate-50/95 backdrop-blur sticky top-0 z-10 border-b border-slate-200">
                                            <tr>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Date & Time</th>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Amount</th>
                                                <th class="px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Remarks</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-100">
                                            ${userTransactionsHtml}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            `;
        }

        /* ==========================================
           ACTION HANDLERS (UNCHANGED LOGIC)
           ========================================== */

        window.logout = function() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            showToast('Signed out securely', 'success');
            render();
        }

        /* --- Admin Actions --- */
        window.updateAdminWallet = async function(action) {
            const amt = document.getElementById('admin-wallet-amount').value;
            if (!amt || amt <= 0) return showToast('Please enter a valid amount', 'error');
            
            try {
                await apiCall('/api/admin', 'PUT', { amount: amt, action });
                showToast(`Master Wallet updated successfully`, 'success');
                document.getElementById('admin-wallet-amount').value = '';
                await loadData();
            } catch (err) {}
        }

        window.handleCreditDebit = async function(userId, username, type) {
            const rawAmt = prompt(`Enter amount to ${type} for ${username}:`);
            if (rawAmt === null) return; 
            const amt = parseInt(rawAmt);
            if (!amt || amt <= 0) return showToast('Invalid amount entered', 'error');

            try {
                await apiCall('/api/wallet', 'POST', { 
                    userId, 
                    amount: amt, 
                    action: type,
                    description: `Admin manual ${type.toLowerCase()}` 
                });
                showToast(`Successfully ${type === 'Credit' ? 'credited to' : 'debited from'} ${username}`, 'success');
                await loadData();
            } catch(err) {}
        }

        window.handleDeleteUser = async function(userId, username) {
            if (!confirm(`Warning: Are you sure you want to permanently delete ${username}?\nTheir remaining balance will be returned to the Master Wallet.`)) return;
            
            try {
                const res = await apiCall(`/api/users?id=${userId}`, 'DELETE');
                showToast(`User deleted. ₹${res.refunded || 0} returned to Master Wallet.`, 'info');
                await loadData();
            } catch (err) {}
        }

        window.updateMarquee = async function() {
            const text = document.getElementById('marquee-input').value;
            try {
                await apiCall('/api/admin', 'POST', { marqueeText: text });
                showToast('Broadcast banner updated globally', 'success');
                await loadData();
            } catch(err) {}
        }

        window.handleRequest = async function(requestId, userId, amount, action) {
            try {
                await apiCall('/api/requests', 'PUT', { requestId, userId, amount, action });
                showToast(`Request ${action}d successfully`, 'success');
                await loadData(); 
            } catch (err) {}
        }

        /* --- User Actions --- */
        window.requestFunds = async function() {
            const amt = parseInt(document.getElementById('request-amount').value);
            if (!amt || amt <= 0) return showToast('Please enter a valid amount', 'error');
            
            try {
                await apiCall('/api/requests', 'POST', { userId: currentUser.id, amount: amt });
                showToast('Fund request submitted to Master Admin', 'success');
                document.getElementById('request-amount').value = '';
            } catch (err) {}
        }

        // Initialize App
        async function init() {
            if (currentUser) {
                await loadData();
            } else {
                render();
            }
        }
        
        // Background Polling
        setInterval(() => {
            if (currentUser && currentUser.role === 'admin') {
                fetch('/api/requests')
                    .then(res => res.json())
                    .then(data => {
                        if (JSON.stringify(data.requests) !== JSON.stringify(fundRequests)) {
                            fundRequests = data.requests;
                            render();
                        }
                    }).catch(err => console.error(err));
            }
        }, 10000);

        // Start App
        init();

    </script>
</body>
</html>
