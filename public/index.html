<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratheek Enterprises - Subagent Portal</title>
    <!-- Premium Font for Business Identity -->
    <link href="[https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap](https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap)" rel="stylesheet">
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://unpkg.com/lucide@latest](https://unpkg.com/lucide@latest)"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-800 font-sans min-h-screen animated-bg">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="flex flex-col gap-3"></div>

    <!-- Loading Spinner (Glassmorphic) -->
    <div id="loading-overlay" class="glass-overlay flex flex-col items-center">
        <i data-lucide="loader" class="animate-spin w-12 h-12 text-blue-600 mb-3 drop-shadow-lg"></i>
        <p class="text-blue-900 font-bold tracking-wide">Processing Securely...</p>
    </div>

    <!-- Main Application Container -->
    <div id="app"></div>

    <script src="script.js"></script>
</body>
</html>
